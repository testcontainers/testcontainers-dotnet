name: Test Report

on:
  workflow_run:
    workflows:
      - Continuous Integration & Delivery
    types:
      - completed

permissions: read-all

jobs:
  test-report:
    permissions:
      actions: read
      contents: read
      checks: write

    runs-on: ubuntu-24.04

    steps:
      # https://github.com/dorny/test-reporter/issues/131#issuecomment-2093880211.
      # https://github.com/dorny/test-reporter/issues/234#issuecomment-1462911162.
      - name: Checkout Repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          lfs: true

      - name: Download Test And Coverage Results
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          run-id: ${{ github.event.workflow_run.id }}
          pattern: Testcontainers*

      - name: Publish Test Report
        uses: dorny/test-reporter@a43b3a5f7366b97d083190328d2c652e1a8b6aa2 # v3.0.0
        with:
          name: test-report
          path: '**/*.trx'
          reporter: dotnet-trx
          only-summary: true
          use-actions-summary: false
          list-suites: failed
          list-tests: failed
          fail-on-empty: false
